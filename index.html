<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>cc-router 控制台</title>
<style>
/* ══ Modern Dark Theme — Vercel/Linear inspired ══ */
:root {
  --bg:        #09090b;
  --surface:   #111113;
  --surface2:  #18181b;
  --surface3:  #1f1f23;
  --border:    #27272a;
  --border2:   #3f3f46;
  --ink:       #fafafa;
  --soft:      #a1a1aa;
  --muted:     #71717a;
  --faint:     #52525b;
  --accent:    #22d3ee;
  --accent-dim:#164e63;
  --green:     #34d399;
  --green-dim: #064e3b;
  --blue:      #60a5fa;
  --blue-dim:  #1e3a5f;
  --violet:    #a78bfa;
  --violet-dim:#4c1d95;
  --amber:     #fbbf24;
  --amber-dim: #78350f;
  --red:       #f87171;
  --red-dim:   #7f1d1d;
  --code:      #0c0c0e;
  --mono: "Cascadia Code","SF Mono","Fira Code",Consolas,monospace;
  --sans: "Inter","Segoe UI","Microsoft YaHei UI",system-ui,-apple-system,sans-serif;
  --radius: 8px;
  --radius-lg: 12px;
  --transition: 150ms cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font:inherit;color:inherit}button{cursor:pointer}
::selection{background:var(--accent-dim);color:var(--accent)}

/* ── Layout ─────────────────────────────────── */
.product{min-height:100vh;display:grid;grid-template-rows:56px 1fr}
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:20px;
  padding:0 20px;
  background:rgba(9,9,11,.85);backdrop-filter:blur(12px) saturate(1.2);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;
}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.mark{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,var(--accent) 0%,#818cf8 100%);box-shadow:0 0 12px rgba(34,211,238,.25)}
.brand strong{display:block;font-size:14px;font-weight:600;letter-spacing:-.01em}
.brand code{display:block;margin-top:1px;color:var(--muted);font-family:var(--mono);font-size:11px}
.signals{display:flex;align-items:center;gap:6px}
.signal{
  display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 10px;
  border:1px solid var(--border);border-radius:999px;background:var(--surface);
  color:var(--soft);font-size:12px;white-space:nowrap;
}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(52,211,153,.4)}

.app{display:grid;grid-template-columns:200px minmax(0,1fr);min-height:calc(100vh - 56px)}
.rail{background:var(--surface);border-right:1px solid var(--border);padding:14px 10px;overflow-y:auto}
.rail-label{color:var(--faint);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:0 10px 8px}
.nav{
  width:100%;height:34px;border:0;border-radius:var(--radius);background:transparent;
  color:var(--muted);display:flex;align-items:center;gap:8px;padding:0 10px;
  margin-bottom:2px;text-align:left;font-size:13px;transition:all var(--transition);
}
.nav:hover{color:var(--soft);background:var(--surface2)}
.nav.active{color:var(--ink);background:var(--surface3);font-weight:600}
.sq{width:14px;height:14px;border:1.5px solid currentColor;border-radius:4px;opacity:.7}
.nav.active .sq{opacity:1}

.local-card{
  margin:20px 4px 0;padding:12px;
  border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);
}
.local-card b{display:block;font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.local-card div{display:flex;justify-content:space-between;gap:10px;margin:6px 0;color:var(--faint);font-size:12px}
.local-card code{color:var(--soft);font-family:var(--mono);font-size:11px}

.main{min-width:0;padding:20px;background:var(--bg)}
.view{display:none}.view.active{display:block}

/* ── Hero ───────────────────────────────────── */
.hero{display:grid;grid-template-columns:minmax(320px,.82fr) minmax(480px,1.4fr);gap:12px;margin-bottom:14px}
.status-hero{
  min-width:0;min-height:170px;display:flex;flex-direction:column;justify-content:space-between;
  padding:20px;border-radius:var(--radius-lg);
  background:linear-gradient(135deg,#0f1729 0%,#0a1628 50%,#0d1f1e 100%);
  border:1px solid rgba(34,211,238,.1);
  box-shadow:0 0 40px rgba(34,211,238,.04),inset 0 1px 0 rgba(255,255,255,.03);
}
.eyebrow{margin-bottom:6px;color:var(--accent);font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;opacity:.8}
.status-hero h1{margin:0;font-size:38px;line-height:1;letter-spacing:-.02em;font-weight:800}
.status-hero h1 span{color:var(--accent)}
.hero-meta{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:16px}
.hero-meta div{border-top:1px solid rgba(255,255,255,.06);padding-top:8px}
.hero-meta strong{display:block;font-size:16px;line-height:1.15;font-weight:700}
.hero-meta span{display:block;margin-top:3px;color:var(--faint);font-size:11px}

/* ── Panels ─────────────────────────────────── */
.route-board,.panel{
  min-width:0;overflow:hidden;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
}
.panel+.panel{margin-top:12px}
.head,.panel-head{
  min-height:42px;display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:0 14px;border-bottom:1px solid var(--border);
}
.head h2,.panel-head h2{margin:0;font-size:13px;font-weight:600}
.head span,.panel-head span{color:var(--muted);font-size:12px}

/* ── Route lanes ────────────────────────────── */
.route-lanes{display:grid;grid-template-columns:1fr 48px 1fr;gap:10px;align-items:stretch;padding:14px}
.lane{
  min-width:0;padding:12px;
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface2);transition:border-color var(--transition);
}
.lane:hover{border-color:var(--border2)}
.lane-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.lane-title strong{font-size:13px;font-weight:600}
.route-arrow{display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:20px;font-weight:900;text-shadow:0 0 12px rgba(34,211,238,.3)}

/* ── Typography helpers ─────────────────────── */
.mono,code{font-family:var(--mono)}
.subtle-code{color:var(--faint);font-family:var(--mono);font-size:11px;overflow-wrap:anywhere}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tag{
  display:inline-flex;align-items:center;
  border:1px solid var(--border);border-radius:999px;
  background:var(--surface3);color:var(--soft);
  padding:3px 8px;font-size:11px;white-space:nowrap;
  transition:all var(--transition);
}
.tag.blue{background:var(--blue-dim);color:var(--blue);border-color:rgba(96,165,250,.2)}
.tag.green{background:var(--green-dim);color:var(--green);border-color:rgba(52,211,153,.2)}
.tag.violet{background:var(--violet-dim);color:var(--violet);border-color:rgba(167,139,250,.2)}
.tag.amber{background:var(--amber-dim);color:var(--amber);border-color:rgba(251,191,36,.2)}
.tag.red{background:var(--red-dim);color:var(--red);border-color:rgba(248,113,113,.2)}

/* ── Buttons ────────────────────────────────── */
.quick-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
.btn{
  height:32px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface2);color:var(--soft);padding:0 12px;
  font-size:13px;transition:all var(--transition);
}
.btn:hover{background:var(--surface3);color:var(--ink);border-color:var(--border2)}
.btn.primary{
  border-color:var(--accent);background:rgba(34,211,238,.1);color:var(--accent);
  font-weight:600;
}
.btn.primary:hover{background:rgba(34,211,238,.18);box-shadow:0 0 12px rgba(34,211,238,.12)}

/* ── Metric strip ───────────────────────────── */
.strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.metric{
  min-height:84px;padding:12px 13px;
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface);transition:all var(--transition);
}
.metric:hover{border-color:var(--border2)}
.metric .label{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px;color:var(--muted);font-size:11px}
.metric .value{font-size:24px;line-height:1;font-weight:800;letter-spacing:-.02em}
.metric .note{margin-top:6px;color:var(--faint);font-size:11px}
.metric.ok .value{color:var(--green)}
.metric.warn .value{color:var(--amber)}
.metric.bad .value{color:var(--red)}

/* ── Main grid ──────────────────────────────── */
.grid{min-width:0;display:grid;grid-template-columns:minmax(560px,1.38fr) minmax(320px,.82fr);gap:12px}
.panel-body{padding:14px}
.backend-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.backend{
  min-width:0;padding:12px;
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface2);
}
.backend h3{margin:0 0 8px;font-size:13px;font-weight:600}
.kv{display:grid;grid-template-columns:72px minmax(0,1fr);gap:8px;margin:6px 0;font-size:12px}
.kv span:first-child{color:var(--muted)}
.kv span:last-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);color:var(--soft)}

/* ── Tables ─────────────────────────────────── */
table{width:100%;border-collapse:collapse}
th{padding:8px 10px;background:var(--surface2);color:var(--muted);font-size:11px;font-weight:600;text-align:left;border-bottom:1px solid var(--border)}
td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:0}
tr:hover td{background:rgba(255,255,255,.015)}
.status{font-family:var(--mono);font-weight:700;font-size:11px}
.status.good{color:var(--green)}.status.fail{color:var(--red)}

/* ── Right sidebar stack ────────────────────── */
.right-stack{display:grid;gap:12px}
.bar-row{display:grid;grid-template-columns:72px 1fr 42px;align-items:center;gap:10px;margin-bottom:10px;font-size:12px;color:var(--soft)}
.track{height:8px;background:var(--surface3);border-radius:999px;overflow:hidden}
.fill{height:100%;border-radius:999px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.fill.text{width:0;background:linear-gradient(90deg,var(--blue),#818cf8)}
.fill.image{width:0;background:linear-gradient(90deg,var(--violet),#c084fc)}
.fill.stream{width:0;background:linear-gradient(90deg,var(--green),#6ee7b7)}
.fill.err{width:0;background:linear-gradient(90deg,var(--red),#fca5a5)}

.reload{
  border-radius:var(--radius);background:var(--code);color:var(--soft);
  padding:14px;margin-bottom:8px;
  border:1px solid var(--border);
}
.reload .path{margin-bottom:8px;color:var(--faint);font-family:var(--mono);font-size:11px;overflow-wrap:anywhere}
.reload strong{display:block;margin-bottom:6px;font-size:22px;line-height:1;color:var(--ink);font-weight:700}
.list{display:grid;gap:6px}
.row{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface2);font-size:12px;transition:border-color var(--transition);
}
.row:hover{border-color:var(--border2)}
.state{
  display:inline-flex;align-items:center;border-radius:999px;
  padding:2px 8px;font-family:var(--mono);font-size:10px;font-weight:600;white-space:nowrap;
}
.state.ok{color:var(--green);background:var(--green-dim)}
.state.warn{color:var(--amber);background:var(--amber-dim)}
.state.err{color:var(--red);background:var(--red-dim)}

/* ── Filters ────────────────────────────────── */
.filters{display:flex;gap:4px;flex-wrap:wrap}
.filters button{
  height:26px;border:1px solid var(--border);background:transparent;border-radius:var(--radius);
  color:var(--muted);padding:0 10px;font-size:12px;transition:all var(--transition);
}
.filters button:hover{color:var(--soft);border-color:var(--border2)}
.filters button.active{
  color:var(--accent);background:rgba(34,211,238,.08);
  border-color:rgba(34,211,238,.25);font-weight:600;
}
.hidden-row{display:none}

/* ── Section headers ────────────────────────── */
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:14px}
.section-head h1{margin:0 0 4px;font-size:22px;line-height:1.12;font-weight:700;letter-spacing:-.02em}
.section-head p{margin:0;color:var(--muted);font-size:13px}

/* ── Provider grid ──────────────────────────── */
.provider-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.provider{
  min-height:140px;padding:14px;
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface);transition:all var(--transition);
}
.provider:hover{border-color:var(--border2);transform:translateY(-1px)}
.provider.active{
  border-color:rgba(34,211,238,.3);background:rgba(34,211,238,.03);
  box-shadow:0 0 20px rgba(34,211,238,.05);
}
.provider h3{margin:0 0 6px;font-size:13px;font-weight:600}
.provider p{min-height:32px;margin:0 0 10px;color:var(--muted);line-height:1.45;font-size:12px}
.provider .base{color:var(--faint);font-size:11px;word-break:break-all;margin-top:8px}

/* ── Config editor ──────────────────────────── */
.config-layout{display:grid;grid-template-columns:minmax(480px,1fr) 320px;gap:12px}
.editor{
  width:100%;min-height:460px;resize:vertical;
  border:0;border-radius:var(--radius);
  background:var(--code);color:#c9d1d9;
  padding:16px;font-family:var(--mono);font-size:12px;line-height:1.7;
  outline:0;transition:border-color var(--transition);
}
.editor:focus{box-shadow:0 0 0 2px rgba(34,211,238,.15)}

/* ── API grid ───────────────────────────────── */
.api-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.api-card{overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.api-top{display:flex;justify-content:space-between;gap:12px;padding:10px 13px;border-bottom:1px solid var(--border)}
.api-card pre{min-height:110px;margin:0;overflow:auto;background:var(--code);color:#c9d1d9;padding:13px;font-family:var(--mono);font-size:11px;line-height:1.6}

/* ── Toast ──────────────────────────────────── */
.toast{
  position:fixed;right:18px;top:18px;z-index:100;
  max-width:380px;transform:translateY(-8px);opacity:0;pointer-events:none;
  transition:.2s cubic-bezier(.4,0,.2,1);
  border-radius:var(--radius);padding:10px 14px;
  background:var(--surface3);color:var(--ink);
  border:1px solid var(--border2);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  font-size:13px;
}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{background:var(--red-dim);border-color:rgba(248,113,113,.3);color:var(--red)}

/* ── Responsive ─────────────────────────────── */
@media(max-width:1140px){
  .hero,.grid,.config-layout{grid-template-columns:1fr}
  .strip{grid-template-columns:repeat(2,1fr)}
  .provider-grid,.api-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .app{grid-template-columns:1fr}.rail{display:none}
}
@media(max-width:760px){
  .topbar,.signals{align-items:flex-start;flex-direction:column;height:auto}
  .topbar{padding:14px}.main{padding:12px}
  .strip,.backend-pair,.provider-grid,.api-grid{grid-template-columns:1fr}
  .route-lanes{grid-template-columns:1fr}.route-arrow{height:18px}
  .head,.panel-head,.section-head{height:auto;min-height:42px;align-items:flex-start;flex-direction:column;padding:10px 14px}
  .status-hero h1{font-size:32px}
  .quick-actions,.filters{width:100%}.quick-actions .btn{flex:1 1 100%}
  .kv span:last-child,.subtle-code,.reload .path,.provider .base,code{overflow-wrap:anywhere;white-space:normal}
  .panel.table-wrap{overflow-x:auto}.panel.table-wrap table{min-width:640px}
}
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="main.js"></script>
<script type="module">
// Fallback: detect if the component app failed to bootstrap.
// If #app is still empty after 3s, show an error message.
setTimeout(function () {
  var app = document.getElementById('app');
  if (app && app.children.length === 0) {
    app.innerHTML = '<div style="padding:3em;text-align:center;font-family:system-ui,sans-serif;background:#09090b;color:#fafafa;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center"><h2 style="font-size:20px;margin-bottom:12px">cc-router 控制台加载失败</h2><p style="color:#71717a;margin-bottom:8px">请检查浏览器控制台 (F12) 查看具体错误。</p><p style="color:#71717a">可尝试硬刷新 (Ctrl+Shift+R) 或检查服务器日志。</p></div>';
  }
}, 3000);
</script>
</body>
</html>
